<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة التحكم</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background: #0a0e1a; color: #e0e8f0; padding: 20px; }
h1 { color: #00d4ff; text-align: center; margin-bottom: 20px; }
.card { background: #0d1b2a; border: 1px solid #1a2a3a; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
input { width: 100%; padding: 10px; margin-bottom: 10px; background: #0a1520; border: 1px solid #1a3a5a; border-radius: 8px; color: #e0e8f0; }
button { width: 100%; padding: 12px; background: #00d4ff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
.btn-red { background: #cc2222; color: #fff; }
.result { background: #0a1520; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 13px; white-space: pre-wrap; min-height: 40px; }
label { color: #7ec8e3; font-size: 13px; display: block; margin-bottom: 4px; }
h3 { margin-bottom: 12px; }
</style>
</head>
<body>
<h1>🔧 لوحة التحكم</h1>

<!-- تسجيل دخول -->
<div class="card">
  <h3 style="color:#00d4ff">تسجيل دخول Admin</h3>
  <label>كلمة مرور Admin</label>
  <input type="password" id="adminPass" placeholder="admin123">
  <button onclick="adminLogin()">دخول</button>
  <div class="result" id="loginResult"></div>
</div>

<!-- إنشاء مستخدم -->
<div class="card">
  <h3 style="color:#00d4ff">➕ إنشاء مستخدم جديد</h3>
  <label>اسم المستخدم</label>
  <input type="text" id="newUser" placeholder="username">
  <label>كلمة المرور</label>
  <input type="text" id="newPass" placeholder="password">
  <label>عدد الأيام</label>
  <input type="number" id="newDays" value="30">
  <label>رصيد ابتدائي</label>
  <input type="number" id="newCredits" value="10">
  <button onclick="createUser()">إنشاء</button>
  <div class="result" id="createResult"></div>
</div>

<!-- إضافة رصيد -->
<div class="card">
  <h3 style="color:#00d4ff">💰 إضافة رصيد</h3>
  <label>اسم المستخدم</label>
  <input type="text" id="creditUser" placeholder="username">
  <label>عدد الكريدت</label>
  <input type="number" id="creditAmount" value="10">
  <button onclick="addCredits()">إضافة رصيد</button>
  <div class="result" id="creditResult"></div>
</div>

<!-- حذف مستخدم -->
<div class="card">
  <h3 style="color:#ff4444">🗑️ حذف مستخدم</h3>
  <label>اسم المستخدم</label>
  <input type="text" id="delUser" placeholder="username">
  <button class="btn-red" onclick="deleteUser()">حذف</button>
  <div class="result" id="delResult"></div>
</div>

<script>
const SERVER = "https://fard-imei-server.vercel.app/api";
let adminToken = "";

async function call(action, body) {
  try {
    const r = await fetch(SERVER + "?action=" + action, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch(e) {
    return { success: false, message: "فشل الاتصال بالسرفر" };
  }
}

async function adminLogin() {
  const pass = document.getElementById("adminPass").value;
  if (!pass) { alert("أدخل كلمة المرور"); return; }
  const res = await call("login", {username:"admin", password:pass, device_id:"web-admin"});
  if (res.success) {
    adminToken = res.token;
    document.getElementById("loginResult").innerText = "✅ تم الدخول بنجاح";
  } else {
    document.getElementById("loginResult").innerText = "❌ " + res.message;
  }
}

async function createUser() {
  if (!adminToken) { alert("سجّل دخول أولاً"); return; }
  const u = document.getElementById("newUser").value;
  const p = document.getElementById("newPass").value;
  if (!u || !p) { alert("أدخل اسم المستخدم وكلمة المرور"); return; }
  const res = await call("create_user", {
    admin_token: adminToken,
    username: u,
    password: p,
    days: parseInt(document.getElementById("newDays").value),
    credits: parseInt(document.getElementById("newCredits").value)
  });
  document.getElementById("createResult").innerText = res.success ? "✅ " + res.message : "❌ " + res.message;
}

async function addCredits() {
  if (!adminToken) { alert("سجّل دخول أولاً"); return; }
  const u = document.getElementById("creditUser").value;
  if (!u) { alert("أدخل اسم المستخدم"); return; }
  const res = await call("add_credits", {
    admin_token: adminToken,
    username: u,
    amount: parseInt(document.getElementById("creditAmount").value)
  });
  document.getElementById("creditResult").innerText = res.success ? "✅ " + res.message : "❌ " + res.message;
}

async function deleteUser() {
  if (!adminToken) { alert("سجّل دخول أولاً"); return; }
  const u = document.getElementById("delUser").value;
  if (!u) { alert("أدخل اسم المستخدم"); return; }
  if (!confirm("هل أنت متأكد من حذف المستخدم: " + u + "؟")) return;
  const res = await call("delete_user", {
    admin_token: adminToken,
    username: u
  });
  document.getElementById("delResult").innerText = res.success ? "✅ " + res.message : "❌ " + res.message;
}
</script>
</body>
</html>
